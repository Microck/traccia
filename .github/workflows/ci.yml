name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check --strict dist/*

      - name: Smoke test installed CLI
        run: uv tool run --from . traccia --help

      - name: Smoke test npm wrapper against local checkout
        run: TRACCIA_USE_LOCAL_REPO=1 node npm/bin/traccia.js --help

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/*
