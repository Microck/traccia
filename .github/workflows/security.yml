name: security

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Export locked runtime requirements
        run: uv export --locked --no-dev --no-emit-project --no-hashes -o requirements-audit.txt

      - name: Audit runtime dependencies
        run: uvx pip-audit -r requirements-audit.txt
